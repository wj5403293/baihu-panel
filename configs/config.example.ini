[server]
# 服务监听端口
port = 8052
# 服务监听地址
host = 0.0.0.0
# URL前缀，例如 /baihu，留空则无前缀
# 配置后：前端路径为 /baihu/*，后端API路径为 /baihu/api/v1/*
url_prefix = 

[database]
# 数据库类型: sqlite, mysql, postgres
type = sqlite
# 数据库连接地址 (mysql/postgres)
host = localhost
# 数据库连接端口 (mysql: 3306, postgres: 5432)
port = 3306
# 数据库用户名
user = root
# 数据库密码
password = 
# 数据库名称
dbname = baihu
# 数据库文件路径 (仅 sqlite)
path = data/baihu.db
# 数据库 DSN (仅 mysql/mariadb, 如果设置则优先使用。注意：需同时将 type 设置为 mysql)
# 例如: user:password@unix(/var/run/mysqld/mysqld.sock)/dbname?charset=utf8mb4&parseTime=True&loc=Local
dsn = 
# 表前缀
table_prefix = baihu_

[security]
# JWT 密钥。留空则在首次启动时自动生成并保存到数据库设置中。
# 如果你手动设置了此项，它将覆盖数据库中的设置。
secret = 


